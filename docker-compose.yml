# ==============================================================================
# Trusty SRE AI Agent Platform — Docker Compose
# ==============================================================================
#
# NOTE: The primary development workflow uses `pnpm dev` which runs Vite +
# Convex dev server locally. Docker Compose is provided for self-hosting
# Langfuse observability alongside the frontend.
#
# The Convex backend runs as a managed service (https://dashboard.convex.dev)
# and does not need a container.
#
# Usage:
#   cp .env.local.example .env.local
#   docker compose up --build
#
# ==============================================================================

services:
  frontend:
    build: .
    container_name: trusty-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_CONVEX_URL=${VITE_CONVEX_URL}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped

  # Langfuse — LLM Observability (self-hosted, optional)
  # Remove this service if using Langfuse Cloud (https://cloud.langfuse.com)
  langfuse:
    image: langfuse/langfuse:latest
    container_name: trusty-langfuse
    ports:
      - "3001:3000"
    environment:
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-changeme-secret-at-least-32-chars}
      - SALT=${LANGFUSE_SALT:-changeme-salt-at-least-32-chars}
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
    depends_on:
      langfuse-db:
        condition: service_healthy
    restart: unless-stopped

  langfuse-db:
    image: postgres:16-alpine
    container_name: trusty-langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  langfuse-data:
